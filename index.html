<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local Offline AI Chatbot</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #252538;
            --user-msg: #89b4fa;
            --ai-msg: #45475a;
            --text-color: #cdd6f4;
            --accent: #b4befe;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh; /* Fixes mobile browser address bar layout jumps */
            margin: 0;
            overflow: hidden; /* Prevents whole-page scrolling */
            padding: 0;
        }
        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 100dvh; /* Full screen on mobile */
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        /* Desktop framing */
        @media (min-width: 640px) {
            #chat-container {
                height: 85dvh;
                border-radius: 12px;
            }
        }
        #status {
            background: #a6e3a1;
            color: #11111b;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            word-wrap: break-word;
        }
        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch; /* Smooth iOS scrolling */
        }

            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
